name: Daily Price & Data Sync

on:
  schedule:
    # Runs every day at 03:00 UTC (06:00 AM Turkish Time)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      run_fix_images:
        description: 'Run fix_images.py standalone to repair broken image URLs'
        required: false
        type: boolean
        default: false
      run_ai_migration:
        description: 'Run bulk_generate_verdicts.py to generate Gemini AI verdicts'
        required: false
        type: boolean
        default: false
      run_fix_seo_data:
        description: 'Run fix_seo_data.py to repair screen sizes and FAQ number formats'
        required: false
        type: boolean
        default: false

jobs:
  sync-data:
    name: Sync Specifications & Prices
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start FlareSolverr
        run: |
          docker run -d \
            --name=flaresolverr \
            -p 8191:8191 \
            -e LOG_LEVEL=info \
            --restart always \
            ghcr.io/flaresolverr/flaresolverr:latest
          
          echo "Waiting for FlareSolverr to start..."
          until curl -s http://localhost:8191/ > /dev/null; do
            sleep 2
          done
          echo "FlareSolverr is up and running!"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Image Repair Script (fix_images.py)
        if: ${{ github.event.inputs.run_fix_images == 'true' }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
        run: |
          python inspect_r2_bucket.py
          python fix_images.py

      - name: Run Technical Data Scraper (Kimovil)
        # Temporarily disabled to stop adding new devices automatically
        if: false
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          KIMOVIL_BASE_URL: ${{ secrets.KIMOVIL_BASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py

      - name: Run SEO Data Repair (fix_seo_data.py)
        if: ${{ github.event.inputs.run_fix_seo_data == 'true' }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          python fix_seo_data.py

      - name: Run Price Update Scraper (TR Merchants)
        if: ${{ github.event.inputs.run_fix_images != 'true' && github.event.inputs.run_ai_migration != 'true' && github.event.inputs.run_fix_seo_data != 'true' }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          python update_prices.py

      - name: Run AI Verdict Migration (bulk_generate_verdicts.py)
        if: ${{ github.event.inputs.run_ai_migration == 'true' }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python bulk_generate_verdicts.py

      - name: Dump FlareSolverr Logs (Diagnostics)
        if: always()
        run: |
          docker logs flaresolverr
